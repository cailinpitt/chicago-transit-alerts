name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # Need enough history to diff against the previous deployed commit
          # so the data-only detector below can see what changed.
          fetch-depth: 0

      # The data pipeline pushes `public/data/alerts.json` (and friends) to
      # main every ~7 minutes. Running tests/lint on those pushes is wasted
      # work, and — more importantly — turns a stale test or transient lint
      # error into a freshness outage on the live site. Detect pushes that
      # only touch the data payload and skip the gates for those. Real code
      # commits still run the full suite.
      - name: Detect data-only push
        id: changes
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          # Initial pushes have a zero SHA for `before`; play it safe and run
          # the full gate. Force-pushes carry a non-zero `before` that points
          # at a commit that's been rewritten out of the repo — `git diff`
          # against a missing object fails the whole job, so verify the
          # object exists first and fall back to the full gate when it doesn't.
          if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]] \
              || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            echo "data_only=false" >> "$GITHUB_OUTPUT"
            echo "No usable before-SHA; running full gate."
            exit 0
          fi
          changed=$(git diff --name-only "$before" "$after")
          echo "Changed files:"
          echo "$changed"
          # If every changed path is under public/data/, this is a data-only
          # push and the tests/lint don't apply.
          if [[ -z "$changed" ]] || ! echo "$changed" | grep -vqE '^public/data/'; then
            echo "data_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "data_only=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - if: steps.changes.outputs.data_only != 'true'
        run: npm test -- --run

      - if: steps.changes.outputs.data_only != 'true'
        run: npm run lint

      - run: sudo apt-get install -y fonts-inter

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Restore OG image cache
        uses: actions/cache@v4
        with:
          path: |
            .og-cache
            .og-cache-pages
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      - run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify WebSub hub
        run: |
          curl -fsS -X POST https://pubsubhubbub.superfeedr.com/ \
            -d hub.mode=publish \
            -d hub.url=https://chicagotransitalerts.app/feed.xml
