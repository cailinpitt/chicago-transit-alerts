name: Deploy to GitHub Pages

on:
  # Real code changes — run the full gate (tests + lint) before deploying.
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tailwind.config.*'
  # Data refreshes. The high-churn data files live in R2, not the repo, so a
  # data change no longer creates a commit. The server fires `data-updated`
  # right after a new incident (mirrors the old event-driven web push), and the
  # schedule below is the catch-up net for any missed dispatch (mirrors the old
  # ~7-min cron). Both rebuild only to refresh prerendered OG cards / CSV / feed
  # — they fetch fresh data from R2 at build time and skip tests/lint, since the
  # code was already gated when it landed on main.
  repository_dispatch:
    types: [data-updated]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Gate only real code changes. Data-driven rebuilds (repository_dispatch /
      # schedule / manual) re-run already-green code with fresh data, so the
      # tests/lint would just be wasted minutes — same reasoning as the old
      # data-only-push skip, but keyed on the trigger instead of a git diff.
      - if: github.event_name == 'push'
        run: npm test -- --run

      - if: github.event_name == 'push'
        run: npm run lint

      - run: sudo apt-get install -y fonts-inter

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Restore OG image cache
        uses: actions/cache@v5
        with:
          path: |
            .og-cache
            .og-cache-pages
          key: og-cache-${{ github.run_id }}
          restore-keys: |
            og-cache-

      # `prebuild` (scripts/fetch-data.js) pulls alerts.json + daily-counts.json
      # from R2 into public/data/ first, so the snapshot + postbuild steps have
      # current data. VITE_DATA_BASE_URL points the *client* at R2 at runtime so
      # the live app is always fresh, independent of when the site was built.
      - run: npm run build
        env:
          VITE_DATA_BASE_URL: https://data.chicagotransitalerts.app

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify WebSub hub
        run: |
          curl -fsS -X POST https://pubsubhubbub.superfeedr.com/ \
            -d hub.mode=publish \
            -d hub.url=https://chicagotransitalerts.app/feed.xml
