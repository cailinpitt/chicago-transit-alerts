<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG calendar card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 56px 72px 48px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, rgba(100, 116, 139, 0.12) 0%, rgba(82, 35, 152, 0.08) 60%, rgba(0, 161, 222, 0.14) 100%),
          radial-gradient(ellipse at top right, rgba(100, 116, 139, 0.18) 0%, transparent 60%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: #475569;
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 22px;
      }
      .title {
        font-size: 60px;
        line-height: 1.0;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 14px;
      }
      .subtitle {
        font-size: 24px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0 0 28px;
        max-width: 1000px;
      }
      /* Grid mirrors the CalendarPage layout — 12 rows × 31 columns. Cells
         are colored using the same intensity stops as the live page so the
         share image is a faithful preview, not a generic stock graphic. */
      .grid-wrap {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .month-row {
        display: grid;
        grid-template-columns: 100px repeat(31, 22px);
        gap: 3px;
        align-items: center;
      }
      .month-label {
        font-size: 13px;
        font-weight: 600;
        color: #64748b;
        text-align: right;
        padding-right: 8px;
        white-space: nowrap;
      }
      .cell {
        width: 22px;
        height: 22px;
        border-radius: 3px;
      }
      .cell.no-data {
        background-image: repeating-linear-gradient(
          -45deg,
          #e2e8f0 0px,
          #e2e8f0 1px,
          #f1f5f9 1px,
          #f1f5f9 4px
        );
      }
      .cell.future, .cell.placeholder {
        background: transparent;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="accent-bar"></div>
      <p class="eyebrow">Chicago Transit Alerts</p>
      <h1 class="title">12-Month Calendar</h1>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="grid-wrap">__GRID__</div>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">/calendar</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
