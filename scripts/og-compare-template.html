<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG compare card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 64px 80px 56px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, rgba(198, 12, 48, 0.10) 0%, rgba(0, 161, 222, 0.10) 50%, rgba(98, 54, 27, 0.10) 100%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: linear-gradient(180deg, #0ea5e9 0%, #f97316 50%, #6366f1 100%);
      }
      .eyebrow {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 28px;
      }
      .title {
        font-size: 96px;
        line-height: 1.0;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.03em;
        margin: 0 0 24px;
      }
      .subtitle {
        font-size: 30px;
        line-height: 1.3;
        color: #475569;
        font-weight: 500;
        margin: 0 0 56px;
        max-width: 1000px;
      }
      /* Abstract comparison-chart graphic — three rows of stacked-bar
         segments in distinct hues, evoking the actual visualizations the
         page renders (signal-mix, duration histogram) without naming any
         specific train line or route. The mock data values are arbitrary
         and read as "metrics differ across the three things being
         compared." */
      .chart {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 32px;
        max-width: 560px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .row-label {
        width: 96px;
        font-size: 16px;
        font-weight: 600;
        color: #475569;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .row-bar {
        flex: 1;
        height: 24px;
        border-radius: 6px;
        display: flex;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.18);
      }
      .row-bar > span { display: block; height: 100%; }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="accent-bar"></div>
      <p class="eyebrow">CTA Alert History</p>
      <h1 class="title">Compare</h1>
      <p class="subtitle">Reliability, signal mix, and resolution time — up to 3 CTA train lines or bus routes, side-by-side, over the last 90 days.</p>
      <div class="chart" aria-hidden="true">
        <div class="row">
          <div class="row-label">Series A</div>
          <div class="row-bar">
            <span style="width: 38%; background: #0ea5e9"></span>
            <span style="width: 22%; background: #f97316"></span>
            <span style="width: 12%; background: #6366f1"></span>
          </div>
        </div>
        <div class="row">
          <div class="row-label">Series B</div>
          <div class="row-bar">
            <span style="width: 24%; background: #0ea5e9"></span>
            <span style="width: 36%; background: #f97316"></span>
            <span style="width: 18%; background: #6366f1"></span>
          </div>
        </div>
        <div class="row">
          <div class="row-label">Series C</div>
          <div class="row-bar">
            <span style="width: 14%; background: #0ea5e9"></span>
            <span style="width: 18%; background: #f97316"></span>
            <span style="width: 30%; background: #6366f1"></span>
          </div>
        </div>
      </div>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">/compare</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
