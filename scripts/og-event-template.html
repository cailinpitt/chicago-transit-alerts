<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG event card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 64px 72px 56px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, var(--accent-soft) 0%, rgba(82, 35, 152, 0.10) 50%, rgba(0, 161, 222, 0.18) 100%),
          radial-gradient(ellipse at top right, var(--accent-soft) 0%, transparent 60%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: var(--accent);
      }
      .badge-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 36px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        background: #e2e8f0;
        color: #475569;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .badge.line {
        background: var(--accent);
        color: var(--accent-text);
      }
      .badge .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
      }
      .title {
        font-size: 68px;
        line-height: 1.05;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 24px;
        max-width: 1000px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .subtitle {
        font-size: 26px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0;
        max-width: 1000px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card" style="--accent: __ACCENT__; --accent-soft: __ACCENT_SOFT__; --accent-text: __ACCENT_TEXT__;">
      <div class="accent-bar"></div>
      <div class="badge-row">
        <div class="badge"><span class="dot"></span>__BADGE__</div>
        __LINE_CHIPS__
      </div>
      <h1 class="title">__TITLE__</h1>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">/event/__EVENT_ID__</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
