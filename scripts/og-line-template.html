<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG line/route card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 64px 72px 56px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, var(--accent-soft) 0%, rgba(82, 35, 152, 0.08) 60%, rgba(0, 161, 222, 0.14) 100%),
          radial-gradient(ellipse at top right, var(--accent-soft) 0%, transparent 60%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: var(--accent);
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 32px;
      }
      /* Active-disruption ribbon, top-right. Empty placeholder is replaced
         with HTML when the line/route has an active incident at build time;
         otherwise the placeholder leaves no visible mark. */
      .active-ribbon {
        position: absolute;
        top: 32px;
        right: 32px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        border-radius: 999px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #b91c1c;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .active-ribbon .dot {
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18);
      }
      .pill {
        display: inline-flex;
        /* The card is a flex column whose default `align-items: stretch`
           would otherwise blow this pill out to full card width. */
        align-self: flex-start;
        align-items: center;
        background: var(--accent);
        color: var(--accent-text);
        padding: 14px 30px;
        border-radius: 999px;
        font-size: 44px;
        font-weight: 800;
        letter-spacing: -0.015em;
        line-height: 1;
        margin: 0 0 24px;
        max-width: 1000px;
      }
      /* Optional headline below the pill — empty on train cards (the pill
         already says "Red Line"), populated on bus cards where the pill
         carries just "#10" and the route name is too long to live inside
         it. Clamp to 2 lines for the longest CTA bus names. */
      .title {
        font-size: 56px;
        line-height: 1.05;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 24px;
        max-width: 1000px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .title:empty { display: none; }
      .subtitle {
        font-size: 28px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0;
        max-width: 1000px;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card" style="--accent: __ACCENT__; --accent-soft: __ACCENT_SOFT__; --accent-text: __ACCENT_TEXT__;">
      <div class="accent-bar"></div>
      __ACTIVE_RIBBON__
      <p class="eyebrow">Chicago Transit Alerts</p>
      <div class="pill">__LABEL__</div>
      <h1 class="title">__TITLE__</h1>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">__PATH__</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
