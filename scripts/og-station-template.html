<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG station card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 64px 72px 56px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, rgba(100, 116, 139, 0.12) 0%, rgba(82, 35, 152, 0.06) 60%, rgba(0, 161, 222, 0.12) 100%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: #475569;
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 28px;
      }
      .station-name {
        font-size: 84px;
        line-height: 1.05;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 28px;
        max-width: 1000px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .lines-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin: 0 0 28px;
      }
      .line-pill {
        display: inline-flex;
        align-items: center;
        padding: 10px 22px;
        border-radius: 999px;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .subtitle {
        font-size: 26px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0;
        max-width: 1000px;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="accent-bar"></div>
      <p class="eyebrow">Chicago Transit Alerts · Station</p>
      <h1 class="station-name">__STATION_NAME__</h1>
      <div class="lines-row">__LINE_PILLS__</div>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">__PATH__</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
