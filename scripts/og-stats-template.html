<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG stats card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 56px 72px 48px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          linear-gradient(90deg, rgba(100, 116, 139, 0.12) 0%, rgba(82, 35, 152, 0.08) 60%, rgba(0, 161, 222, 0.14) 100%),
          radial-gradient(ellipse at top right, rgba(100, 116, 139, 0.18) 0%, transparent 60%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: #475569;
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 22px;
      }
      .title {
        font-size: 64px;
        line-height: 1.0;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 14px;
      }
      .subtitle {
        font-size: 24px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0 0 32px;
        max-width: 1000px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px 32px;
        max-width: 1056px;
      }
      .stat {
        display: flex;
        flex-direction: column;
      }
      .stat-eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #94a3b8;
        margin: 0 0 4px;
      }
      .stat-value {
        font-size: 24px;
        font-weight: 700;
        color: #0f172a;
        line-height: 1.2;
        letter-spacing: -0.015em;
        /* Each leaderboard entry needs to fit on at most two lines so the
           card never overflows; CTA bus route names plus a duration can
           stretch a wide card otherwise. */
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="accent-bar"></div>
      <p class="eyebrow">CTA Alert History</p>
      <h1 class="title">Stats &amp; Leaderboards</h1>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="grid">__STATS__</div>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">/stats</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
