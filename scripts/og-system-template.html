<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG system-health card</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
      }
      .card {
        width: 1200px;
        height: 630px;
        padding: 56px 72px 48px;
        display: flex;
        flex-direction: column;
        position: relative;
        background:
          __BG_GRADIENT__,
          radial-gradient(ellipse at top right, rgba(15, 23, 42, 0.06) 0%, transparent 60%),
          #f8fafc;
      }
      .accent-bar {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 14px;
        background: __ACCENT_BAR__;
      }
      .eyebrow {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #64748b;
        margin: 0 0 22px;
      }
      .title {
        font-size: 80px;
        line-height: 1.0;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.03em;
        margin: 0 0 18px;
      }
      .subtitle {
        font-size: 26px;
        line-height: 1.35;
        color: #475569;
        font-weight: 500;
        margin: 0 0 44px;
        max-width: 980px;
      }
      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        margin-bottom: 36px;
        max-width: 1056px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 12px 24px;
        border-radius: 9999px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .footer {
        margin-top: auto;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .url {
        font-size: 22px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme { color: #94a3b8; font-weight: 400; }
      .url .path { color: #64748b; }
      .tag {
        font-size: 14px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="accent-bar"></div>
      <p class="eyebrow">Chicago Transit Alerts</p>
      <h1 class="title">__TITLE__</h1>
      <p class="subtitle">__SUBTITLE__</p>
      <div class="pills" aria-hidden="true">__PILLS__</div>
      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app<span class="path">__PATH__</span>
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
