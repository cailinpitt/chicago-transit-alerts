<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>OG card</title>
    <style>
      :root {
        --red: #c60c30;
        --blue: #00a1de;
        --brn: #62361b;
        --g: #009b3a;
        --org: #f9461c;
        --pink: #e27ea6;
        --p: #522398;
        --y: #f9e300;
        --bus: #475569;
      }
      * {
        box-sizing: border-box;
      }
      /* macOS qlmanage scales HTML content by 75/64 (≈1.17×) and forces a
         square 1200×1200 thumbnail. Sizing the body 1024×1024 with the card
         1024×538 means it scales up to exactly 1200×1200 in output, with the
         card centered at output rows 285..915 — which is what sips
         --cropToHeightWidth 630 1200 extracts. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        width: 1024px;
        height: 538px;
        background:
          linear-gradient(
            90deg,
            rgba(198, 12, 48, 0.18) 0%,
            rgba(82, 35, 152, 0.14) 35%,
            rgba(0, 161, 222, 0.22) 100%
          ),
          radial-gradient(ellipse at top, rgba(0, 161, 222, 0.18) 0%, transparent 70%),
          #f8fafc;
        padding: 38px 56px 28px;
        display: flex;
        flex-direction: column;
        position: relative;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: #e2e8f0;
        color: #475569;
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        align-self: flex-start;
      }
      .badge .dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #ef4444;
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.18);
      }
      .body-row {
        display: flex;
        gap: 48px;
        flex: 1;
        margin-top: 18px;
        align-items: flex-start;
      }
      .copy {
        flex: 1;
        min-width: 0;
      }
      .title {
        font-size: 64px;
        line-height: 1;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: -0.025em;
        margin: 0 0 14px;
      }
      .subtitle {
        font-size: 19px;
        line-height: 1.4;
        color: #475569;
        font-weight: 400;
        margin: 0;
      }
      .heatmap {
        display: grid;
        grid-template-columns: 48px repeat(12, 1fr);
        gap: 4px;
        align-items: center;
        width: 392px;
        flex-shrink: 0;
      }
      .heatmap .label {
        font-size: 11px;
        font-weight: 700;
        color: #334155;
        text-align: right;
        padding-right: 5px;
      }
      .cell {
        aspect-ratio: 1 / 1;
        border-radius: 3px;
        background: #e2e8f0;
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-top: 20px;
      }
      .url {
        font-size: 19px;
        font-weight: 600;
        color: #0f172a;
        letter-spacing: -0.01em;
      }
      .url .scheme {
        color: #94a3b8;
        font-weight: 400;
      }
      .tag {
        font-size: 11px;
        color: #64748b;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"><span class="dot"></span>Live archive</div>

      <div class="body-row">
        <div class="copy">
          <h1 class="title">CTA Alert<br />History</h1>
          <p class="subtitle">
            A public archive of CTA service alerts and bot-detected disruptions, with a 90-day
            heatmap of incident frequency.
          </p>
        </div>

        <div class="heatmap">
          <div class="label">Red</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--red); opacity: 0.55;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--red); opacity: 0.95;"></div>
          <div class="cell" style="background: var(--red); opacity: 0.45;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--red); opacity: 0.85;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--red); opacity: 0.7;"></div>
          <div class="cell" style="background: var(--red); opacity: 0.5;"></div>
          <div class="cell"></div>

          <div class="label">Blue</div>
          <div class="cell" style="background: var(--blue); opacity: 0.7;"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.95;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.6;"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.85;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.5;"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.9;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.65;"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.4;"></div>
          <div class="cell" style="background: var(--blue); opacity: 0.75;"></div>

          <div class="label">Brown</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--brn); opacity: 0.55;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--brn); opacity: 0.45;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--brn); opacity: 0.6;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--brn); opacity: 0.4;"></div>
          <div class="cell"></div>

          <div class="label">Green</div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--g); opacity: 0.7;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--g); opacity: 0.55;"></div>
          <div class="cell" style="background: var(--g); opacity: 0.4;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--g); opacity: 0.75;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--g); opacity: 0.5;"></div>
          <div class="cell"></div>

          <div class="label">Orange</div>
          <div class="cell" style="background: var(--org); opacity: 0.6;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--org); opacity: 0.45;"></div>
          <div class="cell" style="background: var(--org); opacity: 0.7;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--org); opacity: 0.5;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--org); opacity: 0.55;"></div>
          <div class="cell" style="background: var(--org); opacity: 0.4;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--org); opacity: 0.65;"></div>

          <div class="label">Pink</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--pink); opacity: 0.55;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--pink); opacity: 0.4;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--pink); opacity: 0.5;"></div>
          <div class="cell"></div>

          <div class="label">Purple</div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--p); opacity: 0.5;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--p); opacity: 0.6;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--p); opacity: 0.45;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--p); opacity: 0.4;"></div>

          <div class="label">Yellow</div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--y); opacity: 0.5;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--y); opacity: 0.55;"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>

          <div class="label">Buses</div>
          <div class="cell" style="background: var(--bus); opacity: 0.55;"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.8;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.65;"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.4;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.9;"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.5;"></div>
          <div class="cell"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.7;"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.45;"></div>
          <div class="cell" style="background: var(--bus); opacity: 0.6;"></div>
        </div>
      </div>

      <div class="footer">
        <div class="url">
          <span class="scheme">https://</span>chicagotransitalerts.app
        </div>
        <div class="tag">Unofficial · Not affiliated with the CTA</div>
      </div>
    </div>
  </body>
</html>
